<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Dashboard | Matrícula LCC</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#003913",
                        "primary-container": "#0d4a1e",
                        "green-mid": "#1a6e35",
                        "green-main": "#2a9050",
                        "green-bright": "#3db86a",
                        "ink": "#111810",
                        "muted": "#5a6e5c",
                        "secondary": "#e6c364"
                    },
                    "fontFamily": {
                        "sans": ["DM Sans", "sans-serif"],
                        "display": ["Playfair Display", "serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f4f7f5;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="font-sans antialiased text-ink">

    <nav
        class="w-full bg-white border-b border-gray-200/80 px-6 py-3 flex justify-between items-center shadow-sm sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <svg class="w-8 h-8 text-primary-container" viewBox="0 0 100 100" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path d="M50 85C50 85 80 70 80 40V20 L50 10 L20 20V40C20 70 50 85 50 85Z" fill="#0d4a1e" />
                <path d="M50 78C50 78 74 65 74 40V24 L50 15 L26 24V40C26 65 50 78 50 78Z" fill="#1a6e35" />
                <path
                    d="M36 32h6v24h12v5H36V32zm20 17c0-8 5-13 12-13 5 0 9 2 11 6l-4 4c-2-2-4-3-7-3-4 0-6 3-6 7s2 7 6 7c3 0 5-1 7-3l4 4c-3 4-7 6-12 6-7 0-12-5-12-13zm25 0c0-8 5-13 12-13 5 0 9 2 11 6l-4 4c-2-2-4-3-7-3-4 0-6 3-6 7s2 7 6 7c3 0 5-1 7-3l4 4c-3 4-7 6-12 6-7 0-12-5-12-13z"
                    fill="#ffffff" />
                <path d="M12 40c0 20 15 35 32 38M88 40c0 20-15 35-32 38" stroke="#0d4a1e" stroke-width="3"
                    stroke-linecap="round" />
            </svg>
            <span class="font-bold text-primary-container tracking-wider text-sm md:text-base font-sans">MATRÍCULA
                LCC</span>
        </div>

        <div
            class="flex items-center gap-2 bg-gray-50 hover:bg-gray-100 py-1.5 px-3 rounded-full border border-gray-200 transition-colors cursor-pointer group">
            <div class="w-7 h-7 rounded-full bg-green-100 flex items-center justify-center text-primary-container">
                <span class="material-symbols-outlined text-lg"
                    style="font-variation-settings: 'FILL' 1">account_circle</span>
            </div>
            <span class="text-xs md:text-sm font-medium text-gray-700" id="user-navbar-name">Hola, Juan Pérez</span>
            <span
                class="material-symbols-outlined text-gray-400 text-sm group-hover:text-ink transition-transform duration-200 group-hover:translate-y-0.5">expand_more</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">

        <section
            class="bg-white rounded-[24px] border border-gray-100 p-8 md:p-10 shadow-[0_4px_20px_rgba(0,0,0,0.03)] flex flex-col md:flex-row justify-between items-center relative overflow-hidden mb-8">
            <div class="flex flex-col items-center md:items-start text-center md:text-left z-10 w-full md:w-1/2">
                <div
                    class="w-24 h-24 bg-[#e6f7ec] rounded-full flex items-center justify-center mb-6 border border-[#c8ddc9]/40 shadow-sm">
                    <svg class="w-16 h-16 text-primary-container" viewBox="0 0 100 100" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 85C50 85 80 70 80 40V20 L50 10 L20 20V40C20 70 50 85 50 85Z" fill="#0d4a1e" />
                        <path d="M50 78C50 78 74 65 74 40V24 L50 15 L26 24V40C26 65 50 78 50 78Z" fill="#1a6e35" />
                        <path
                            d="M32 34h5v20h10v4H32V34zm16 12c0-6 4-10 9-10 4 0 7 2 8 5l-3.5 3c-1-1.5-2.5-2-4.5-2-3 0-5 2-5 6s2 6 5 6c2 0 3.5-.5 4.5-2l3.5 3c-1.5 3.5-4.5 5-8 5-5 0-9-4-9-10zm21 0c0-6 4-10 9-10 4 0 7 2 8 5l-3.5 3c-1-1.5-2.5-2-4.5-2-3 0-5 2-5 6s2 6 5 6c2 0 3.5-.5 4.5-2l3.5 3c-1.5 3.5-4.5 5-8 5-5 0-9-4-9-10z"
                            fill="#ffffff" />
                        <path d="M10 42c0 18 13 32 28 35M90 42c0 18-13 32-28 35" stroke="#2a9050" stroke-width="2.5"
                            stroke-linecap="round" />
                    </svg>
                </div>
                <h1 class="text-3xl md:text-[38px] font-bold text-gray-900 tracking-tight leading-none">Bienvenido</h1>
                <h2 class="text-3xl md:text-[35px] font-black text-[#0d4a1e] tracking-tight mt-1 mb-6">MATRÍCULA LCC
                </h2>
                <div
                    class="w-full flex items-center justify-center md:justify-start gap-3 text-sm font-normal text-gray-400">
                    <div class="h-[1px] bg-gray-200 w-16"></div>
                    <span class="text-gray-500 font-medium">Panel principal</span>
                    <div class="h-[1px] bg-gray-200 flex-1 max-w-[240px]"></div>
                </div>
            </div>

            <div class="w-full md:w-1/2 flex justify-center mt-8 md:mt-0 relative">
                <div class="relative w-72 h-64 flex items-center justify-center">
                    <div class="absolute top-6 left-6 grid grid-cols-3 gap-2 opacity-30">
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full"></div>
                    </div>
                    <div class="absolute w-60 h-60 bg-[#eaf5ee] rounded-full bottom-0 right-2 -z-10"></div>
                    <svg viewBox="0 0 200 200" class="w-full h-full drop-shadow-sm z-10">
                        <path d="M140 115 c8 0, 22 18, 20 45 c-2 18, -12 28, -20 28" fill="#1f2937" />
                        <path d="M65 200 c0-35, 18-60, 48-60 s48 25, 48 60 Z" fill="#2a9050" />
                        <path d="M90 140 q10 12, 20 0" fill="none" stroke="#1a6e35" stroke-width="4"
                            stroke-linecap="round" />
                        <path d="M101 140 l4 15 l4-15" fill="none" stroke="#ffffff" stroke-width="2" />
                        <circle cx="102" cy="85" r="28" fill="#fdd09f" />
                        <path
                            d="M74 80 c3-18, 22-22, 32-18 c12-8, 26-5, 22 12 c4 0, 4-8, -4-12 c-8-4-22 0-22 4 c-8-8-22 0-28 14 Z"
                            fill="#1f2937" />
                        <circle cx="95" cy="82" r="2" fill="#1f2937" />
                        <circle cx="113" cy="82" r="2" fill="#1f2937" />
                        <path d="M98 96 q4 5, 10 0" fill="none" stroke="#1f2937" stroke-width="2"
                            stroke-linecap="round" />
                        <path d="M65 140 C50 120, 45 102, 52 94 C56 89, 63 98, 70 120 Z" fill="#2a9050" />
                        <path d="M52 94 Q45 80, 47 75 Q52 72, 56 82 Q59 72, 63 77 Q66 74, 68 81 Q70 85, 63 94 Z"
                            fill="#fdd09f" />
                    </svg>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">

            <a href="tipoingreso.html"
                class="bg-white border border-gray-100 rounded-2xl p-6 flex items-center justify-between shadow-sm hover:shadow-md hover:border-emerald-200 transition-all duration-300 cursor-pointer group no-underline text-current">
                <div class="flex items-center gap-4">
                    <div
                        class="w-14 h-14 bg-[#e6f7ec] rounded-full flex items-center justify-center text-green-main group-hover:scale-105 transition-transform">
                        <span class="material-symbols-outlined text-2xl"
                            style="font-variation-settings: 'FILL' 1">note_add</span>
                    </div>
                    <div>
                        <h3
                            class="text-base font-bold text-gray-900 group-hover:text-primary-container transition-colors">
                            Registrar matrícula</h3>
                        <div
                            class="w-6 h-[2px] bg-gray-300 my-1 group-hover:w-12 group-hover:bg-green-main transition-all">
                        </div>
                        <p class="text-xs text-gray-400 font-medium">Inicia tu proceso de inscripción</p>
                    </div>
                </div>
                <span
                    class="material-symbols-outlined text-gray-300 group-hover:text-primary-container group-hover:translate-x-1 transition-all">arrow_forward_ios</span>
            </a>

            <a href="estadoM.html"
                class="bg-white border border-gray-100 rounded-2xl p-6 flex items-center justify-between shadow-sm hover:shadow-md hover:border-emerald-200 transition-all duration-300 cursor-pointer group no-underline text-current">
                <div class="flex items-center gap-4">
                    <div
                        class="w-14 h-14 bg-[#e6f7ec] rounded-full flex items-center justify-center text-green-main group-hover:scale-105 transition-transform">
                        <span class="material-symbols-outlined text-2xl"
                            style="font-variation-settings: 'FILL' 1">assignment_turned_in</span>
                    </div>
                    <div>
                        <h3
                            class="text-base font-bold text-gray-900 group-hover:text-primary-container transition-colors">
                            Ver estado</h3>
                        <div
                            class="w-6 h-[2px] bg-gray-300 my-1 group-hover:w-12 group-hover:bg-green-main transition-all">
                        </div>
                        <p class="text-xs text-gray-400 font-medium">Consulta el progreso de tu matrícula</p>
                    </div>
                </div>
                <span
                    class="material-symbols-outlined text-gray-300 group-hover:text-primary-container group-hover:translate-x-1 transition-all">arrow_forward_ios</span>
            </a>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const storedName = localStorage.getItem('user_name');
            const userNavbarName = document.getElementById('user-navbar-name');

            if (storedName && storedName.trim() !== "") {
                userNavbarName.textContent = `Hola, ${storedName}`;
            } else {
                userNavbarName.textContent = "Hola, Juan Pérez";
            }
        });
    </script>
</body>

</html>
