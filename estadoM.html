<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Estado de Matrícula</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green-dark: #1a6e35;
      --green-main: #2a8a45;
      --green-mid: #3aaa5a;
      --green-light: #e6f7ec;
      --green-pale: #f0faf3;
      --green-check: #27ae60;
      --text-dark: #1c2b22;
      --text-mid: #3d5c47;
      --text-soft: #7a9e85;
      --white: #ffffff;
      --radius-xl: 20px;
      --radius-lg: 14px;
      --radius-md: 10px;
      --shadow-card: 0 4px 20px rgba(42, 138, 69, .10);
      --shadow-hero: 0 8px 32px rgba(26, 110, 53, .25);
    }

    html,
    body {
      height: 100%;
      background: #f4f8f5;
      font-family: 'Outfit', sans-serif;
      color: var(--text-dark);
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .phone-frame {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #f4f8f5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── Hero Header ── */
    .hero {
      background: linear-gradient(145deg, var(--green-dark) 0%, var(--green-main) 60%, var(--green-mid) 100%);
      padding: 52px 24px 44px;
      position: relative;
      overflow: hidden;
      border-radius: 0 0 32px 32px;
      box-shadow: var(--shadow-hero);
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .07);
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -60px;
      left: -30px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .04);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255, 255, 255, .85);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 24px;
      width: fit-content;
      transition: color .2s;
      text-decoration: none;
      position: relative;
      z-index: 1;
    }

    .back-btn svg {
      width: 18px;
      height: 18px;
    }

    .back-btn:hover {
      color: #fff;
    }

    .hero-title {
      font-family: 'Nunito', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
      position: relative;
      z-index: 1;
    }

    .hero-sub {
      font-size: 14px;
      color: rgba(255, 255, 255, .75);
      font-weight: 400;
      margin-top: 4px;
      position: relative;
      z-index: 1;
      letter-spacing: .3px;
    }

    /* ── Scrollable Body ── */
    .body {
      flex: 1;
      padding: 28px 20px 36px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    /* ── Progress Section ── */
    .progress-section {
      padding-bottom: 8px;
      /* evita regla vacía */
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-mid);
    }

    .progress-pct {
      font-family: 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--green-main);
    }

    .progress-bar-bg {
      height: 10px;
      background: #d6ead9;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--green-main), var(--green-mid));
      border-radius: 99px;
      transition: width 1.2s cubic-bezier(.4, 0, .2, 1);
    }

    /* ── Status Card ── */
    .status-card {
      background: var(--green-light);
      border: 1.5px solid #b8e4c5;
      border-radius: var(--radius-xl);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeUp .5s ease both;
      animation-delay: .3s;
    }

    .status-icon {
      width: 48px;
      height: 48px;
      background: rgba(42, 138, 69, .12);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .status-title {
      font-family: 'Nunito', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: var(--green-dark);
    }

    .status-desc {
      font-size: 13px;
      color: var(--text-mid);
      font-weight: 400;
      margin-top: 2px;
      line-height: 1.4;
    }

    /* ── Timeline ── */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 4px 0;
    }

    .timeline-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      position: relative;
      animation: fadeUp .5s ease both;
    }

    .timeline-item:nth-child(1) {
      animation-delay: .4s;
    }

    .timeline-item:nth-child(2) {
      animation-delay: .55s;
    }

    .timeline-item:nth-child(3) {
      animation-delay: .70s;
    }

    .timeline-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .timeline-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--green-check);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(39, 174, 96, .35);
    }

    .timeline-circle svg {
      width: 18px;
      height: 18px;
    }

    .timeline-line {
      width: 2px;
      flex: 1;
      min-height: 28px;
      background: linear-gradient(to bottom, var(--green-check), #c5e8cf);
      margin: 3px 0;
    }

    .timeline-item:last-child .timeline-line {
      display: none;
    }

    .timeline-content {
      padding-bottom: 22px;
    }

    .timeline-step {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-dark);
    }

    .timeline-date {
      font-size: 12px;
      color: var(--text-soft);
      margin-top: 2px;
      font-weight: 400;
    }

    /* ── Docs Card ── */
    .docs-card {
      background: var(--white);
      border: 1.5px solid #d8eede;
      border-radius: var(--radius-xl);
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      box-shadow: var(--shadow-card);
      animation: fadeUp .5s ease both;
      animation-delay: .8s;
    }

    .docs-icon {
      width: 42px;
      height: 42px;
      background: var(--green-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .docs-icon svg {
      width: 20px;
      height: 20px;
    }

    .docs-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--green-main);
      margin-bottom: 4px;
    }

    .docs-desc {
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.5;
    }

    /* ── CTA Button ── */
    .cta-btn {
      width: 100%;
      padding: 17px;
      border: 2px solid #c8e6cf;
      border-radius: var(--radius-xl);
      background: transparent;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-mid);
      cursor: pointer;
      transition: all .25s ease;
      animation: fadeUp .5s ease both;
      animation-delay: .95s;
      letter-spacing: .3px;
    }

    .cta-btn:hover {
      background: var(--green-light);
      border-color: var(--green-mid);
      color: var(--green-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(42, 138, 69, .15);
    }

    .cta-btn:active {
      transform: translateY(0);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="phone-frame">

    <div class="hero">
      <a class="back-btn" href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6" />
        </svg>
        Volver
      </a>
      <div class="hero-title">Estado de Matrícula</div>
      <div class="hero-sub">Seguimiento de tu solicitud</div>
    </div>

    <div class="body">

      <div class="progress-section">
        <div class="progress-header">
          <span class="progress-label">Progreso</span>
          <span class="progress-pct" id="progressPctText">66%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"
            style="width: 0%; background: linear-gradient(90deg, #f59e0b, #d97706);"></div>
        </div>
      </div>

      <div class="status-card" id="mainStatusCard" style="background: #fef3c7; border-color: #fde68a;">
        <div class="status-icon" id="mainStatusIcon" style="background: rgba(245,158,11,0.15);">🕒</div>
        <div>
          <div class="status-title" id="mainStatusTitle" style="color: #b45309;">En Proceso</div>
          <div class="status-desc" id="mainStatusDesc">Tu matrícula está siendo revisada.</div>
        </div>
      </div>

      <div class="timeline">

        <div class="timeline-item">
          <div class="timeline-left">
            <div class="timeline-circle">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </div>
            <div class="timeline-line"></div>
          </div>
          <div class="timeline-content">
            <div class="timeline-step">Solicitud recibida</div>
            <div class="timeline-date">15 Ene 2026</div>
          </div>
        </div>

        <div class="timeline-item">
          <div class="timeline-left">
            <div class="timeline-circle" id="tlIcon2"
              style="background: #f59e0b; box-shadow: 0 2px 10px rgba(245,158,11,0.35);">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
              </svg>
            </div>
            <div class="timeline-line" id="tlLine2" style="background: #e2e8f0;"></div>
          </div>
          <div class="timeline-content">
            <div class="timeline-step">En proceso</div>
            <div class="timeline-date">16 Ene 2026</div>
          </div>
        </div>

        <div class="timeline-item">
          <div class="timeline-left">
            <div class="timeline-circle" id="tlIcon3" style="background: #f1f5f9; box-shadow: none;">
              <svg viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
              </svg>
            </div>
            <div class="timeline-line"></div>
          </div>
          <div class="timeline-content">
            <div class="timeline-step" id="tlText3" style="color: #94a3b8;">Aprobado</div>
            <div class="timeline-date" id="tlDate3" style="color: #cbd5e1;">Pendiente</div>
          </div>
        </div>

      </div>

      <div class="docs-card">
        <div class="docs-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#2a8a45" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <polyline points="9 15 11 17 15 13" />
          </svg>
        </div>
        <div>
          <div class="docs-title">Documentos aprobados</div>
          <div class="docs-desc">Todos tus documentos han sido aprobados. Ya puedes continuar con tu proceso de
            matrícula.</div>
        </div>
      </div>

      <button class="cta-btn" onclick="window.location.href='dashboard.html'">Volver al Inicio</button>

    </div>
  </div>

  <script>
    // Simulate loading process
    window.addEventListener('load', () => {
      const fill = document.getElementById('progressFill');
      const pct = document.getElementById('progressPctText');
      const card = document.getElementById('mainStatusCard');
      const icon = document.getElementById('mainStatusIcon');
      const title = document.getElementById('mainStatusTitle');
      const desc = document.getElementById('mainStatusDesc');
      const tlIcon2 = document.getElementById('tlIcon2');
      const tlLine2 = document.getElementById('tlLine2');
      const tlIcon3 = document.getElementById('tlIcon3');
      const tlText3 = document.getElementById('tlText3');
      const tlDate3 = document.getElementById('tlDate3');

      // Start at 66%
      setTimeout(() => {
        fill.style.width = '66%';
      }, 300);

      // Transition to 100% after 4.5 seconds
      setTimeout(() => {
        fill.style.background = 'linear-gradient(90deg, var(--green-main), var(--green-mid))';
        fill.style.width = '100%';
        pct.style.color = 'var(--green-main)';

        let counter = 66;
        let int = setInterval(() => {
          if (counter >= 100) clearInterval(int);
          else { counter++; pct.innerText = counter + '%'; }
        }, 15);

        // Update card
        card.style.background = 'var(--green-light)';
        card.style.borderColor = '#b8e4c5';
        icon.style.background = 'rgba(42,138,69,.12)';
        icon.innerText = '🎉';
        title.style.color = 'var(--green-dark)';
        title.innerText = 'Aprobado';
        desc.innerText = 'Tu matrícula ha sido aprobada exitosamente.';

        // Update timeline
        tlIcon2.style.background = 'var(--green-check)';
        tlIcon2.style.boxShadow = '0 2px 10px rgba(39,174,96,.35)';
        tlIcon2.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        tlLine2.style.background = 'linear-gradient(to bottom, var(--green-check), #c5e8cf)';

        tlIcon3.style.background = 'var(--green-check)';
        tlIcon3.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        tlText3.style.color = 'var(--text-dark)';
        tlDate3.style.color = 'var(--text-soft)';
        tlDate3.innerText = '17 Ene 2026';
      }, 4500);
    });
  </script>
</body>

</html>
